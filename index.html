<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portrait Interview App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>ポートレート設計インタビュー</h1>
      <p class="rule">開始するには「ポートレート設計」と入力してください。</p>

      <section id="start-section" class="card">
        <label for="start-input">開始キーワード</label>
        <div class="row">
          <input id="start-input" type="text" placeholder="ポートレート設計" />
          <button id="start-btn">開始</button>
        </div>
      </section>

      <section id="interview-section" class="card hidden">
        <h2 id="step-title"></h2>
        <p id="question" class="question"></p>
        <pre id="examples" class="examples"></pre>

        <label for="answer-input">回答</label>
        <textarea id="answer-input" rows="4" placeholder="ここに入力"></textarea>
        <div class="row">
          <button id="next-btn">次へ</button>
          <button id="restart-btn" class="secondary">最初から</button>
        </div>
      </section>

      <section id="result-section" class="card hidden">
        <h2>【入力まとめ】</h2>
        <pre id="result"></pre>
        <div class="row">
          <button id="restart-btn-result" class="secondary">もう一度実行</button>
        </div>
      </section>

      <p id="error" class="error"></p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
