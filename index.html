<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portrait Interview App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>ポートレート設計インタビュー</h1>
      <p class="rule">一覧から選択・入力して、最後にまとめを作成してください。</p>

      <section class="card">
        <form id="portrait-form"></form>
        <div class="actions">
          <button id="generate-btn" type="button">入力まとめを作成</button>
          <button id="reset-btn" type="button" class="secondary">リセット</button>
        </div>
      </section>

      <section id="result-section" class="card hidden">
        <h2>【入力まとめ】</h2>
        <pre id="result"></pre>
      </section>

      <p id="error" class="error"></p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
